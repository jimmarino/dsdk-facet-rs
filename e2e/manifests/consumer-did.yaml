#
# Stable cluster fixture: nginx serving the consumer DID document.
# The ConfigMap (consumer-did) and Secret (consumer-did-private-key) are created
# by setup.sh with a generated Ed25519 keypair and must exist before applying this.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-did
  namespace: vault-e2e-test
  labels:
    app: consumer-did
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-did
  template:
    metadata:
      labels:
        app: consumer-did
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: did-document
          mountPath: /usr/share/nginx/html/.well-known/did.json
          subPath: did.json
        readinessProbe:
          httpGet:
            path: /.well-known/did.json
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: did-document
        configMap:
          name: consumer-did
---
apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: vault-e2e-test
  labels:
    app: consumer-did
spec:
  type: ClusterIP
  selector:
    app: consumer-did
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
