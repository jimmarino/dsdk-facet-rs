---
apiVersion: v1
kind: ConfigMap
metadata:
  name: siglet-config
  namespace: vault-e2e-test
data:
  siglet.toml: |
    [storage_backend]
    type = "postgres-vault"
    url = "postgresql://siglet:siglet@postgres:5432/siglet"

    [[transfer_types]]
    transfer_type = "http-pull"
    endpoint_type = "HTTP"
    endpoint = "http://provider:8080/data"
    token_source = "provider"
